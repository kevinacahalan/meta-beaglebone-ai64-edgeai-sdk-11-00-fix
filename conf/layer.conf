# Layer configuration for meta-bbai64-custom
# Local customizations / fixes for the BeagleBone AI-64 on TISDK 11.00 (edgeai).

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "bbai64custom"
BBFILE_PATTERN_bbai64custom := "^${LAYERDIR}/"
# High priority so our .bbappends / files win over the base layers.
BBFILE_PRIORITY_bbai64custom = "999"

LAYERDEPENDS_bbai64custom = "core meta-edgeai"
LAYERSERIES_COMPAT_bbai64custom = "scarthgap"
